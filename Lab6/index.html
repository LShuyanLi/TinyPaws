<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab6</title>
    <script src="script.js" defer></script>
</head>

  <body>
    <main>
      <h1>Student list</h1>
          <h2>Enter student's name and grade</h2>

            <label for="nameInput">Name: </label>
            <input type="text" id="nameInput">
            <br>
            <label for="gradeInput">Grade: </label>
            <input type="text" id="gradeInput">

          <div class="submitStudent">
            <button id="submitButton">Submit</button>
          </div>

        <h2>Class List</h2>
        <ul id="classList"></ul>

        <p id="topStudentDisplay">Top Student: </p>

      <div class="studentRandomizer">
        <h2>Student picker</h2>
        <button id="randomButton">Pick a Student</button>
        <p id="randomStudentDisplay"></p>
      </div>
    </main>
  </body>
</html>
